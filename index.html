<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#2C1A10">
  <title>Wild Lives — Mobile Museum</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style/main.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="logo-area">
        <svg class="logo-leaf" viewBox="0 0 40 40" width="40" height="40" aria-hidden="true">
          <path d="M20,4 C8,4 4,16 4,24 C4,32 12,36 20,36 C20,28 28,22 36,18 C32,10 26,4 20,4 Z" fill="#6B7B3C"/>
          <path d="M20,36 C20,28 28,22 36,18" stroke="#4A5E28" stroke-width="1.5" fill="none"/>
        </svg>
        <h1 class="logo-text">WILD LIVES</h1>
      </div>
      <p class="tagline">Discover · Protect · Play</p>
    </div>
  </header>

  <main class="gallery" id="gallery" role="main">
    <div class="carousel-header">
      <span class="carousel-label">Species</span>
      <div class="carousel-rule"></div>
      <span class="carousel-counter" id="carousel-counter"><b>01</b>/08</span>
    </div>
    <div class="carousel-viewport" id="carousel-viewport">
      <button class="carousel-nav carousel-nav--prev" id="carousel-prev" aria-label="Previous species">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="carousel-track" id="gallery-grid"></div>
      <button class="carousel-nav carousel-nav--next" id="carousel-next" aria-label="Next species">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
    <div class="carousel-dots" id="carousel-dots"></div>
  </main>

  <footer class="site-footer">
    <p>Every species matters. Every action counts.</p>
  </footer>

  <!-- Species Detail Modal -->
  <div class="modal-overlay" id="detail-modal" hidden aria-modal="true" role="dialog" aria-labelledby="modal-name">
    <div class="modal-backdrop" id="detail-backdrop"></div>
    <div class="modal-card" role="document">
      <button class="btn-close" id="close-detail" aria-label="Close details">&#x2715;</button>
      <div class="modal-art-area" id="modal-art"></div>
      <div class="modal-content">
        <div class="modal-header-row">
          <span class="status-badge" id="modal-status"></span>
          <div>
            <h2 class="modal-title" id="modal-name"></h2>
            <p class="scientific-name" id="modal-scientific"></p>
          </div>
        </div>
        <div class="modal-stats-row">
          <div class="stat-chip">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span id="modal-population"></span>
          </div>
          <div class="stat-chip">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
            <span id="modal-habitat"></span>
          </div>
        </div>
        <div class="threat-box" id="modal-threat"></div>
        <ul class="facts-list" id="modal-facts"></ul>
        <button class="btn-play" id="btn-play" aria-label="Play mini game for this species">
          <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true"><polygon points="6,4 20,12 6,20" fill="currentColor"/></svg>
          Play Game
        </button>
      </div>
    </div>
  </div>

  <!-- Game Modal -->
  <div class="modal-overlay game-overlay" id="game-modal" hidden aria-modal="true" role="dialog" aria-label="Mini game">
    <canvas id="game-canvas" aria-label="Game canvas"></canvas>
    <button class="btn-close game-close-btn" id="close-game" aria-label="Close game">&#x2715;</button>
  </div>

  <script src="js/data.js"></script>
  <script src="js/games/engine.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
