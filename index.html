<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#111111">
  <title>Wild Lives — Mobile Museum</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Raleway:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style/main.css">
</head>
<body>

  <!-- ── Minimal Header ── -->
  <header class="site-header">
    <span class="site-name">Wild Lives</span>
    <div class="species-counter" id="species-counter" aria-live="polite" aria-label="Species position">
      <span class="counter-num"><span id="counter-current">1</span><span class="counter-sep"> / </span><span id="counter-total">8</span></span>
      <span class="counter-label">endangered species</span>
    </div>
    <div class="header-icons">
      <button class="icon-btn" aria-label="Search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
      <button class="icon-btn" aria-label="About">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="8"/><line x1="12" y1="12" x2="12" y2="16"/>
        </svg>
      </button>
      <button class="icon-btn" aria-label="Menu">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ── Vertical Accordion Panels ── -->
  <main class="panels-area" id="panels-area" role="main" aria-label="Species gallery"></main>

  <!-- ── Fact Viewer ── -->
  <div id="fact-viewer" hidden>
    <div class="fv-slide-area" id="fv-slide-area"></div>
    <div class="fv-bar">
      <div class="fv-dots" id="fv-dots"></div>
      <div class="fv-hint" id="fv-hint">TAP TO CONTINUE</div>
      <div class="fv-counter" id="fv-counter"></div>
    </div>
    <button class="fv-close" id="fv-close" aria-label="Close">&#x2715;</button>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
