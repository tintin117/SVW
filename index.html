<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#111111">
  <title>Wild Lives — Mobile Museum</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Raleway:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style/main.css">
</head>
<body>

  <!-- ── Minimal Header ── -->
  <header class="site-header">
    <span class="site-name">Wild Lives</span>
    <div class="header-icons">
      <button class="icon-btn" aria-label="Search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
      <button class="icon-btn" aria-label="About">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="8"/><line x1="12" y1="12" x2="12" y2="16"/>
        </svg>
      </button>
      <button class="icon-btn" aria-label="Menu">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ── Vertical Accordion Panels ── -->
  <main class="panels-area" id="panels-area" role="main" aria-label="Species gallery"></main>

  <!-- ── Species Detail Modal ── -->
  <div class="modal-overlay" id="detail-modal" hidden aria-modal="true" role="dialog" aria-labelledby="modal-name">
    <div class="modal-backdrop" id="detail-backdrop"></div>
    <div class="modal-card" role="document">
      <button class="btn-close" id="close-detail" aria-label="Close details">&#x2715;</button>
      <div class="modal-art-area" id="modal-art"></div>
      <div class="modal-content">
        <div class="modal-header-row">
          <span class="status-badge" id="modal-status"></span>
          <div>
            <h2 class="modal-title" id="modal-name"></h2>
            <p class="scientific-name" id="modal-scientific"></p>
          </div>
        </div>
        <div class="modal-stats-row">
          <div class="stat-chip">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span id="modal-population"></span>
          </div>
          <div class="stat-chip">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
            <span id="modal-habitat"></span>
          </div>
        </div>
        <div class="threat-box" id="modal-threat"></div>
        <ul class="facts-list" id="modal-facts"></ul>
        <button class="btn-play" id="btn-play" aria-label="Play mini game for this species">
          <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true"><polygon points="6,4 20,12 6,20" fill="currentColor"/></svg>
          Play Game
        </button>
      </div>
    </div>
  </div>

  <!-- ── Game Modal ── -->
  <div class="modal-overlay game-overlay" id="game-modal" hidden aria-modal="true" role="dialog" aria-label="Mini game">
    <canvas id="game-canvas" aria-label="Game canvas"></canvas>
    <button class="btn-close game-close-btn" id="close-game" aria-label="Close game">&#x2715;</button>
  </div>

  <script src="js/data.js"></script>
  <script src="js/games/engine.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
